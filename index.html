<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDU at you | 차세대 교육 육성 플랫폼</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@100..900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
      scroll-behavior: smooth;
    }
    .edu-glow {
      text-shadow: 0 0 15px rgba(124, 58, 237, 0.6);
      color: #7c3aed;
      font-weight: 900;
    }
    .dark .edu-glow {
      text-shadow: 0 0 15px rgba(167, 139, 250, 0.6);
      color: #a78bfa;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(124, 58, 237, 0.1);
    }
    .dark .glass-card {
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(167, 139, 250, 0.1);
    }
    ::-webkit-scrollbar {
      width: 10px;
    }
    ::-webkit-scrollbar-track {
      background: #f8fafc;
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(to bottom, #7c3aed, #4f46e5);
      border-radius: 10px;
    }
    @keyframes floating {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }
    .animate-float {
      animation: floating 4s ease-in-out infinite;
    }
    .keyword-reveal {
      background: linear-gradient(120deg, #7c3aed 0%, #4f46e5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 3s infinite linear;
      background-size: 200% auto;
    }
    @keyframes shine {
      to { background-position: 200% center; }
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(124, 58, 237, 0.3);
      border-radius: 10px;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "framer-motion": "https://esm.sh/framer-motion@11.11.11?external=react,react-dom",
    "canvas-confetti": "https://esm.sh/canvas-confetti@1.9.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.37.0"
  }
}
</script>
</head>
<body class="bg-slate-50 text-slate-900 transition-colors duration-500 overflow-x-hidden">
  <div id="root"></div>
</body>
</html>
